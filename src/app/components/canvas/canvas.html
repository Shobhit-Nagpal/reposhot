<!-- Desktop -->
@if (!isMobile()) {
  <mat-drawer-container class="w-auto h-full px-4 !bg-white" autosize>
    <mat-drawer mode="side" opened>
      <reposhot-sidesheet-controls [canvasEl]="canvas() ?? null" [imageName]="canvasData().name" />
    </mat-drawer>
    <mat-drawer-content>
      <canvas #reposhotCanvas class="w-full h-auto"></canvas>
    </mat-drawer-content>
  </mat-drawer-container>
}

<!-- Mobile -->
@if (isMobile()) {
  <div class="flex flex-col h-full p-2">
    <canvas #reposhotCanvas class="w-full h-auto"></canvas>
    <div class="overflow-y-auto">
      <reposhot-sidesheet-controls [canvasEl]="canvas() ?? null" [imageName]="canvasData().name" />
    </div>
  </div>
}
